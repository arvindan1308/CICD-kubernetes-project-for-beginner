apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-webpage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/arvindan1308/CICD-kubernetes-project-for-beginner.git"
    targetRevision: HEAD
    path: manifests
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
